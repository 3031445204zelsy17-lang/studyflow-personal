    <style>
        * { font-family: 'Inter', sans-serif; }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .animated-gradient {
            background: linear-gradient(135deg, #0066CC 0%, #2E7D52 50%, #0066CC 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .float-shape { animation: float 6s ease-in-out infinite; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in-up { animation: fadeInUp 0.6s ease forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        
        .course-card {
            transition: all 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .tab-active {

            color: #0066CC;

        }
        
        .modal {

            position: fixed;

            left: 0;
            width: 100%;

            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;

        .modal.active { display: flex; }
        
        .progress-bar {

        // ============================================

        let userProgress = JSON.parse(localStorage.getItem('dsai_progress')) || {};
        
        function saveProgress() {
            localStorage.setItem('dsai_progress', JSON.stringify(userProgress));
        }
        
        function getCourseStatus(courseId) {
            return userProgress[courseId] || 'not_started';
        }
        
        function setCourseStatus(courseId, status) {
            userProgress[courseId] = status;
            saveProgress();
            showToast(`Course marked as ${status.replace('_', ' ')}`);
        }
        
        function checkPrerequisites(courseId) {
            const course = coursesData.find(c => c.id === courseId);
            if (!course || !course.prerequisites || course.prerequisites.length === 0) {
                return { canSelect: true, missing: [] };
            }
            const missing = course.prerequisites.filter(preId => getCourseStatus(preId) !== 'completed');
            return { canSelect: missing.length === 0, missing };
        }
        
        function getEffectiveStatus(courseId) {
            const status = getCourseStatus(courseId);
            if (status === 'not_started') {
                const preCheck = checkPrerequisites(courseId);
                return preCheck.canSelect ? 'available' : 'locked';
            }
            return status;
        }

            }, 3000);

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

                link.classList.add('text-text-secondary');
            });
            event.target.classList.remove('text-text-secondary');
            event.target.classList.add('text-hkmu-blue', 'font-semibold');
            
            // Hide mobile menu
            document.getElementById('mobileMenu').classList.add('hidden');
            
            // Render page content
            const mainContent = document.getElementById('mainContent');
            switch(pageName) {
                case 'home':
                    mainContent.innerHTML = renderHomePage();
                    break;
                case 'progress':
                    mainContent.innerHTML = renderProgressPage();
                    break;
                case 'courses':
                    mainContent.innerHTML = renderCoursesPage();
                    break;
                case 'plan':
                    mainContent.innerHTML = renderPlanPage();
                    break;
            }
            
            // Re-initialize Lucide icons
            lucide.createIcons();
        }

            return `

                    ` : ''}
                </div>
            `;
        }

        function filterCourses() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const filtered = coursesData.filter(course => {
                const matchesSearch = course.name.toLowerCase().includes(search) || course.code.toLowerCase().includes(search);
                const matchesYear = !year || course.year === parseInt(year);
                const matchesCategory = !category || course.category === category;
                const matchesStatus = !status || getEffectiveStatus(course.id) === status;
                return matchesSearch && matchesYear && matchesCategory && matchesStatus;
            });
            
            document.getElementById('coursesGrid').innerHTML = filtered.map(course => renderCourseCard(course)).join('');
            lucide.createIcons();
        }

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-page-bg rounded-lg p-3 text-center">
                            <div class="text-sm text-text-secondary">Credits</div>
                            <div class="text-xl font-bold text-text-primary">${course.credits}</div>
                        </div>
                        <div class="bg-page-bg rounded-lg p-3 text-center">
                            <div class="text-sm text-text-secondary">Year</div>
                            <div class="text-xl font-bold text-text-primary">${course.year}</div>
                        </div>
                        <div class="bg-page-bg rounded-lg p-3 text-center">
                            <div class="text-sm text-text-secondary">Semester</div>
                            <div class="text-xl font-bold text-text-primary capitalize">${course.semester}</div>
                        </div>
                        <div class="bg-page-bg rounded-lg p-3 text-center">
                            <div class="text-sm text-text-secondary">Rating</div>
                            <div class="text-xl font-bold text-text-primary">${avgRating} ⭐</div>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="font-semibold text-text-primary mb-2">Description</h3>
                        <p class="text-text-secondary">${course.description}</p>
                    </div>
                    
                    ${course.prerequisites.length > 0 ? `
                        <div class="mb-6">
                            <h3 class="font-semibold text-text-primary mb-2">Prerequisites</h3>
                            <div class="flex flex-wrap gap-2">
                                ${course.prerequisites.map(preId => {
                                    const pre = coursesData.find(c => c.id === preId);
                                    const preStatus = getCourseStatus(preId);
                                    return `<span class="px-3 py-1 rounded-full text-sm ${preStatus === 'completed' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${pre ? pre.code : preId}</span>`;
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="mb-6">
                        <h3 class="font-semibold text-text-primary mb-3">Update Status</h3>
                        <div class="flex gap-3">
                            <button onclick="setCourseStatus('${courseId}', 'completed'); openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="check" class="w-4 h-4"></i> Completed
                            </button>
                            <button onclick="setCourseStatus('${courseId}', 'in-progress'); openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="clock" class="w-4 h-4"></i> In Progress
                            </button>
                            <button onclick="setCourseStatus('${courseId}', 'not_started'); openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset
                            </button>
                        </div>
                    </div>
                    
                    <!-- Tabs -->
                    <div class="border-b mb-4">
                        <div class="flex gap-6">
                            <button onclick="switchModalTab('reviews', '${courseId}')" class="pb-2 tab-active" id="tab-reviews">Reviews (${reviews.length})</button>
                            <button onclick="switchModalTab('materials', '${courseId}')" class="pb-2 text-text-secondary hover:text-text-primary" id="tab-materials">Materials (${materials.length})</button>
                        </div>
                    </div>
                    
                    <!-- Reviews Tab -->
                    <div id="modal-reviews" class="space-y-4 max-h-64 overflow-y-auto">
                        ${reviews.length > 0 ? reviews.map(review => `
                            <div class="bg-page-bg rounded-lg p-4">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <div class="font-semibold text-text-primary">${review.author}</div>
                                        <div class="text-sm text-text-secondary">Year ${review.year} • ${review.semester}</div>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        ${Array(review.rating).fill('⭐').join('')}
                                    </div>
                                </div>
                                <p class="text-text-secondary text-sm mb-2">${review.content}</p>
                                <div class="flex items-center gap-2 text-sm text-text-secondary">
                                    <button onclick="likeReview('${courseId}', ${review.id})" class="flex items-center gap-1 hover:text-hkmu-blue">
                                        <i data-lucide="thumbs-up" class="w-4 h-4"></i> ${review.helpful}
                                    </button>
                                </div>
                            </div>
                        `).join('') : '<p class="text-text-secondary text-center py-4">No reviews yet. Be the first to review!</p>'}
                    </div>
                    
                    <!-- Materials Tab -->
                    <div id="modal-materials" class="space-y-4 max-h-64 overflow-y-auto hidden">
                        ${materials.length > 0 ? materials.map(mat => `
                            <div class="bg-page-bg rounded-lg p-4 flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <i data-lucide="file-text" class="w-8 h-8 text-hkmu-blue"></i>
                                    <div>
                                        <div class="font-medium text-text-primary">${mat.filename}</div>
                                        <div class="text-sm text-text-secondary">${mat.category} • ${formatFileSize(mat.size)} • ${mat.downloads} downloads</div>
                                    </div>
                                </div>
                                <button onclick="downloadMaterial('${courseId}', ${mat.id})" class="p-2 hover:bg-hkmu-light-blue rounded-lg text-hkmu-blue">
                                    <i data-lucide="download" class="w-5 h-5"></i>
                                </button>
                            </div>
                        `).join('') : '<p class="text-text-secondary text-center py-4">No materials uploaded yet.</p>'}
                    </div>
                </div>
            `;
            
            document.getElementById('courseModal').classList.add('active');
            lucide.createIcons();
        }

        function closeCourseModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        function switchModalTab(tab, courseId) {
            document.getElementById('tab-reviews').classList.remove('tab-active');
            document.getElementById('tab-materials').classList.remove('tab-active');
            document.getElementById('tab-' + tab).classList.add('tab-active');
            
            document.getElementById('modal-reviews').classList.add('hidden');
            document.getElementById('modal-materials').classList.add('hidden');
            document.getElementById('modal-' + tab).classList.remove('hidden');
        }

        function likeReview(courseId, reviewId) {
            const reviews = reviewsData[courseId] || [];
            const review = reviews.find(r => r.id === reviewId);
            if (review) {
                review.helpful++;
                saveReviews();
                openCourseModal(courseId);
                showToast('Review marked as helpful!');
            }
        }

        function downloadMaterial(courseId, materialId) {
            const materials = materialsData[courseId] || [];
            const material = materials.find(m => m.id === materialId);
            if (material) {
                material.downloads++;
                saveMaterials();
                showToast(`Downloading ${material.filename}...`);
            }
        }

        function showYearCourses(year) {
            document.getElementById('mainContent').innerHTML = renderCoursesPage();
            document.getElementById('yearFilter').value = year;
            filterCourses();
            lucide.createIcons();
        }

        function showCategoryCourses(category) {
            document.getElementById('mainContent').innerHTML = renderCoursesPage();
            document.getElementById('categoryFilter').value = category;
            filterCourses();
            lucide.createIcons();
        }

        // Close modal on backdrop click
        document.getElementById('courseModal').addEventListener('click', function(e) {
            if (e.target === this) closeCourseModal();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCourseModal();
        });
    </script>
    <script src="bridge.js"></script>
</body>
</html>
