    <div class="container mt-4">
        <h1 class="text-center">Welcome to HKMU Lost and Found Website</h1>
        
        
        <div class="mb-4">
            <input type="text" id="search-input" class="form-control" placeholder="Search for item descriptions or locations...">
        </div>

        
        <h2>Lost Items</h2>
        <div id="lost-list" class="row"></div>

       
        <h2>Found Items</h2>
        <div id="found-list" class="row"></div>

       
        <h2 id="post-form">Publish items</h2>
        <form id="item-form">
            <div class="mb-3">
                <label for="type" class="form-label">Type</label>
                <select id="type" class="form-select" required>
                    <option value="">Select type</option>
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Describe</label>
                <textarea id="description" class="form-control" required></textarea>
            </div>
            <div class="mb-3">
                <label for="location" class="form-label">Location</label>
                <input type="text" id="location" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="contact" class="form-label">Contact information</label>
                <input type="text" id="contact" class="form-control" required placeholder="Email or phone">
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Upload pictures (optional)</label>
                <input type="file" id="image" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">Release</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const itemForm = document.getElementById('item-form');
            const lostList = document.getElementById('lost-list');
            const foundList = document.getElementById('found-list');
            const searchInput = document.getElementById('search-input');

            
            let items = JSON.parse(localStorage.getItem('items')) || [];

            
            function renderItems(filter = '') {
                lostList.innerHTML = '';
                foundList.innerHTML = '';

                items.forEach((item, index) => {
                    if (filter && !item.description.toLowerCase().includes(filter.toLowerCase()) && !item.location.toLowerCase().includes(filter.toLowerCase())) {
                        return;
                    }

                    const imageHtml = item.image ? `<img src="${item.image}" alt="Item Image" class="card-img-top img-fluid">` : '';

                    const card = `
                        <div class="col-md-4">
                            <div class="card">
                                ${imageHtml}
                                <div class="card-body">
                                    <h5 class="card-title">${item.description}</h5>
                                    <p class="card-text">Location: ${item.location}</p>
                                    <p class="card-text">Data: ${item.date}</p>
                                    <p class="card-text">Contact: ${item.contact}</p>
                                    <button class="btn btn-danger btn-sm" onclick="deleteItem(${index})">Delete</button>
                                </div>
                            </div>
                        </div>
                    `;

                    if (item.type === 'lost') {
                        lostList.innerHTML += card;
                    } else {
                        foundList.innerHTML += card;
                    }
                });
            }

          
            itemForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const type = document.getElementById('type').value;
                const description = document.getElementById('description').value;
                const location = document.getElementById('location').value;
                const date = document.getElementById('date').value;
                const contact = document.getElementById('contact').value;
                const imageInput = document.getElementById('image');

                if (!type || !description || !location || !date || !contact) {
                    alert('Please fill in all the required fields.');
                    return;
                }

                const reader = new FileReader();
                if (imageInput.files && imageInput.files[0]) {
                    reader.onload = (event) => {
                        const image = event.target.result;
                        items.push({ type, description, location, date, contact, image });
                        localStorage.setItem('items', JSON.stringify(items));
                        renderItems();
                        itemForm.reset();
                    };
                    reader.readAsDataURL(imageInput.files[0]);
                } else {
                    items.push({ type, description, location, date, contact, image: '' });
                    localStorage.setItem('items', JSON.stringify(items));
                    renderItems();
                    itemForm.reset();
                }
            });

            
            window.deleteItem = (index) => {
                items.splice(index, 1);
                localStorage.setItem('items', JSON.stringify(items));
                renderItems();
            };

           
            searchInput.addEventListener('input', (e) => {
                renderItems(e.target.value);
            });

            
            renderItems();
        });
        lucide.createIcons();
    </script>
</body>
